apiVersion: v1
kind: Namespace
metadata:
  name: jenkins
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins-admin
  namespace: jenkins
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jenkins-admin-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: jenkins-admin
  namespace: jenkins
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jenkins-pvc
  namespace: jenkins
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: jenkins-casc
  namespace: jenkins
data:
  jenkins.yaml: |
    jenkins:
      numExecutors: 0
      clouds:
        - kubernetes:
            name: "kubernetes"
            serverUrl: "https://kubernetes.default.svc.cluster.local"
            namespace: "jenkins"
            jenkinsUrl: "http://jenkins-service.jenkins.svc.cluster.local:8081"
            jenkinsTunnel: "jenkins-service.jenkins.svc.cluster.local:50000"
            templates:
              - name: "k8s-agent"
                label: "k8s-agent"
                namespace: "jenkins"
                serviceAccount: "jenkins-admin"
                containers:
                  - name: "jnlp"
                    image: "jenkins/inbound-agent:latest"
                  - name: "git"
                    image: "alpine/git:latest"
                    command: ["cat"]
                    tty: true
                  - name: "kaniko"
                    image: "gcr.io/kaniko-project/executor:debug"
                    command: ["cat"]
                    tty: true
                  - name: "kubectl"
                    image: "bitnami/kubectl:latest"
                    command: ["cat"]
                    tty: true
    jobs:
      - script: >
          pipelineJob('k8s-agent-pipeline') {
            definition {
              cps {
                script('''
                  pipeline {
                    agent {
                      node { label 'k8s-agent' }
                    }
                    options {
                      timeout(time: 15, unit: 'MINUTES')
                    }
                    environment {
                      REPO_URL      = 'https://github.com/ranazrad/devops-dashboard.git'
                      GIT_BRANCH    = 'main'
                      REGISTRY_USER = 'rokubato'
                      IMAGE_NAME    = 'devops-dashboard'
                      IMAGE_TAG     = "${BUILD_NUMBER}"
                    }
                    stages {
                      stage('Clone Repository') {
                        steps {
                          container('git') {
                            sh "git clone -b ${GIT_BRANCH} ${REPO_URL} ."
                          }
                        }
                      }
                      stage('Build & Push Image (Kaniko)') {
                        steps {
                          withCredentials([usernamePassword(credentialsId: 'dockerhub', usernameVariable: 'DOCKER_USER', passwordVariable: 'DOCKER_PASS')]) {
                            container('kaniko') {
                              sh """
                                mkdir -p /kaniko/.docker
                                AUTH=\$(echo -n "\${DOCKER_USER}:\${DOCKER_PASS}" | base64 | tr -d '\\n')
                                echo "{\\"auths\\":{\\"https://index.docker.io/v1/\\":{\\"auth\\":\\"\${AUTH}\\"}}}" > /kaniko/.docker/config.json
                                
                                /kaniko/executor \
                                --context=dir://src/DevopsDashboard.App \
                                --dockerfile=src/DevopsDashboard.App/Dockerfile \
                                --destination=\${REGISTRY_USER}/\${IMAGE_NAME}:\${IMAGE_TAG} \
                                --skip-push-permission-check
                              """
                            }
                          }
                        }
                      }
                      stage('Deploy to Kubernetes') {
                        steps {
                          container('kubectl') {
                            sh """
                              echo "Deploying to Kubernetes..."
                              kubectl set image deployment/\${IMAGE_NAME} \
                              \${IMAGE_NAME}=\${REGISTRY_USER}/\${IMAGE_NAME}:\text{\${IMAGE_TAG}} --namespace=jenkins
                              kubectl rollout status deployment/\${IMAGE_NAME} --namespace=jenkins
                            """
                          }
                        }
                      }
                    }
                  }
                '''.stripIndent())
                sandbox()
              }
            }
          }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins-controller
  namespace: jenkins
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins-controller
  template:
    metadata:
      labels:
        app: jenkins-controller
    spec:
      serviceAccountName: jenkins-admin
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
      initContainers:
      - name: install-plugins
        image: jenkins/jenkins:lts
        command:
        - sh
        - -c
        - jenkins-plugin-cli --plugins kubernetes workflow-aggregator configuration-as-code job-dsl pipeline-stage-view -d /usr/share/jenkins/ref/plugins
        volumeMounts:
        - name: plugin-dir
          mountPath: /usr/share/jenkins/ref/plugins
      containers:
      - name: jenkins
        image: jenkins/jenkins:lts
        ports:
        - containerPort: 8080
          name: httpport
        - containerPort: 50000
          name: jnlpport
        env:
        - name: JAVA_OPTS
          value: "-Djenkins.install.runSetupWizard=false"
        - name: CASC_JENKINS_CONFIG
          value: "/var/jenkins_home/casc_configs/jenkins.yaml"
        volumeMounts:
        - name: jenkins-data
          mountPath: /var/jenkins_home
        - name: casc-volume
          mountPath: /var/jenkins_home/casc_configs
        - name: plugin-dir
          mountPath: /usr/share/jenkins/ref/plugins
      volumes:
      - name: jenkins-data
        persistentVolumeClaim:
          claimName: jenkins-pvc
      - name: casc-volume
        configMap:
          name: jenkins-casc
      - name: plugin-dir
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: jenkins-service
  namespace: jenkins
spec:
  type: NodePort
  selector:
    app: jenkins-controller
  ports:
  - name: httpport
    port: 8081
    targetPort: 8080
    nodePort: 32000
  - name: jnlpport
    port: 50000
    targetPort: 50000
